const A=2026,B=2025,DH=D.meta.dias_habiles;
const fm=n=>n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?Math.round(n/1e3)+'K':Math.round(n).toString();

let ch=[],cT=0;
function st(i){cT=i;document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('on',j===i));rf();}
function rf(){ch.forEach(c=>c.destroy());ch=[];const e=document.getElementById('ct');e.innerHTML='';[t0,t1,t2,t3,t4][cT](e);}
function mc(ct,cfg){const w=document.createElement('div');w.className='cw';const cv=document.createElement('canvas');w.appendChild(cv);ct.appendChild(w);const c=new Chart(cv,{...cfg,options:{...cfg.options,responsive:true,maintainAspectRatio:false,plugins:{...cfg.options?.plugins,legend:{labels:{color:'#94a3b8',font:{size:11}}}},scales:Object.fromEntries(Object.entries(cfg.options?.scales||{}).map(([k,v])=>[k,{...v,ticks:{...v?.ticks,color:'#94a3b8',font:{size:10}},grid:{...v?.grid,color:'#33415533'}}]))}});ch.push(c);return c;}

// ── TAB 1: RUBROS Y LINEAS ──
function t1(e){
    const rl=D.rubros_lineas||[];
    const rubros=[...new Set(rl.map(r=>r.ra))].filter(r=>r!=='Otros'&&r!=='Devoluciones');
    const meses=[...new Set(rl.map(r=>r.m))].sort((a,b)=>a-b);

    // Peso de rubros (barras)
    const c1=document.createElement('div');c1.className='cd';
    c1.innerHTML='<div class="cd-t">Peso de rubros por mes (kg)</div>';
    e.appendChild(c1);
    const colors={'Leches':'#2563eb','Frescos':'#10b981','Quesos':'#f59e0b','Devoluciones':'#6b7280','Otros':'#475569'};
    mc(c1,{type:'bar',data:{labels:meses.map(m=>MN[m]),datasets:rubros.map(ra=>({
        label:ra+(ra==='Frescos'?' *':''),
        data:meses.map(m=>rl.filter(r=>r.ra===ra&&r.m===m).reduce((s,r)=>s+r.kg,0)),
        backgroundColor:colors[ra]||'#8b5cf6',borderRadius:3
    }))},options:{scales:{x:{stacked:true},y:{stacked:true,ticks:{callback:v=>fm(v)}}}}
    });
    const nota=document.createElement('div');nota.style.cssText='font-size:11px;color:#64748b;margin-top:-8px;margin-bottom:16px';
    nota.textContent='* Frescos incluye Dulce de Leche (DDL)';e.appendChild(nota);

    // Recorte por linea
    const c2=document.createElement('div');c2.className='cd';
    c2.innerHTML='<div class="cd-t">% Recorte por linea — evolucion mensual</div>';
    const lineas=[...new Set(rl.map(r=>r.l))];
    let tbl='<table><thead><tr><th>Linea</th><th>Rubro</th>'+meses.map(m=>'<th>'+MN[m]+'</th>').join('')+'<th>Acum.</th></tr></thead><tbody>';
    lineas.forEach(l=>{
        const lr=rl.filter(r=>r.l===l);
        const tK=lr.reduce((s,r)=>s+r.kg,0);const tR=lr.reduce((s,r)=>s+r.rec,0);
        if(tK<10000)return;
        const tP=tK>0?Math.round(tR/tK*1000)/10:0;
        const ra=lr[0]?.ra||'';
        tbl+=`<tr><td style="font-weight:500;font-size:11px">${l}</td><td style="font-size:10px;color:#64748b">${ra}</td>`;
        meses.forEach(m=>{const r=lr.find(x=>x.m===m);const p=r?r.pct:0;tbl+=`<td><span class="bg ${bd(p)}">${p}%</span></td>`;});
        tbl+=`<td style="font-weight:700"><span class="bg ${bd(tP)}">${tP}%</span></td></tr>`;
    });
    tbl+='</tbody></table>';c2.innerHTML+=tbl;e.appendChild(c2);

    // Evolucion de lineas top por kg
    const c3=document.createElement('div');c3.className='cd';
    c3.innerHTML='<div class="cd-t">Evolucion mensual de lineas principales (kg)</div>';
    e.appendChild(c3);
    const topL=lineas.sort((a,b)=>rl.filter(r=>r.l===b).reduce((s,r)=>s+r.kg,0)-rl.filter(r=>r.l===a).reduce((s,r)=>s+r.kg,0)).slice(0,6);
    const lc=['#2563eb','#f59e0b','#10b981','#ef4444','#8b5cf6','#ec4899'];
    mc(c3,{type:'line',data:{labels:meses.map(m=>MN[m]),datasets:topL.map((l,i)=>({
        label:l,data:meses.map(m=>rl.filter(r=>r.l===l&&r.m===m).reduce((s,r)=>s+r.kg,0)),
        borderColor:lc[i%6],backgroundColor:lc[i%6]+'33',tension:0.3,fill:false,pointRadius:4
    }))},options:{scales:{y:{beginAtZero:true,ticks:{callback:v=>fm(v)}}}}
    });
}

// ── TAB 2: RECORTES ──
function t2(e){
    const dims=[['canal','Canal'],['rubro','Rubro'],['linea','Linea'],['suc_emision','Sucursal emision']];
    const fd=document.createElement('div');fd.className='fl';
    let aD=dims[0];
    dims.forEach(([k,lb],i)=>{
        const f=document.createElement('div');f.className='fb'+(i===0?' on':'');f.textContent='Por '+lb;
        f.onclick=()=>{fd.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));f.classList.add('on');aD=[k,lb];rR();};
        fd.appendChild(f);
    });
    e.appendChild(fd);
    const cd=document.createElement('div');cd.id='rct';e.appendChild(cd);
    function rR(){
        const ct=document.getElementById('rct');ct.innerHTML='';
        const[k,lb]=aD;const rows=D['recorte_'+k]||[];
        const vals=[...new Set(rows.map(r=>r[k]))];
        const meses=[...new Set(rows.map(r=>r.mes))].sort((a,b)=>a-b);
        const c=document.createElement('div');c.className='cd';
        c.innerHTML=`<div class="cd-t">% Recorte por ${lb} — evolucion ${A}</div>`;
        let tbl='<table><thead><tr><th>'+lb+'</th>'+meses.map(m=>'<th>'+MN[m]+'</th>').join('')+'<th>Acum.</th></tr></thead><tbody>';
        vals.forEach(v=>{
            const vR=rows.filter(r=>r[k]===v);const tK=vR.reduce((s,r)=>s+r.kg,0);const tRc=vR.reduce((s,r)=>s+r.rec,0);
            if(tK<5000)return;const tP=tK>0?Math.round(tRc/tK*1000)/10:0;
            tbl+=`<tr><td style="font-weight:500;font-size:11px">${v}</td>`;
            meses.forEach(m=>{const r=vR.find(x=>x.mes===m);const p=r?r.pct:0;tbl+=`<td><span class="bg ${bd(p)}">${p}%</span></td>`;});
            tbl+=`<td style="font-weight:700"><span class="bg ${bd(tP)}">${tP}%</span></td></tr>`;
        });
        tbl+='</tbody></table>';c.innerHTML+=tbl;ct.appendChild(c);
    }
    rR();
    if(D.cruce_canal_linea?.length){
        const c3=document.createElement('div');c3.className='cd';
        c3.innerHTML='<div class="cd-t">Top combinaciones canal x linea con mayor recorte</div>';
        let t3='<table><thead><tr><th>Canal</th><th>Linea</th><th>Kg</th><th>Recorte</th><th>%</th></tr></thead><tbody>';
        D.cruce_canal_linea.forEach(r=>{t3+=`<tr><td>${r.canal}</td><td>${r.linea}</td><td>${fm(r.kg)}</td><td>${fm(r.rec)}</td><td><span class="bg ${bd(r.pct)}">${r.pct}%</span></td></tr>`;});
        t3+='</tbody></table>';c3.innerHTML+=t3;e.appendChild(c3);
    }
}

// ── TAB 3: KG/DIA HABIL (diario) ──
function t3(e){
    const p=D.proyeccion||{};
    const mP=D.meta.mes_parcial;
    const diario=D.diario||[];

    if(mP&&diario.length){
        const c1=document.createElement('div');c1.className='cd';
        c1.innerHTML=`<div class="cd-t">Venta diaria ${MN[mP]||''} — ${A} vs ${B} (kg)</div><div class="cd-s">Cada punto = kg vendidos en un dia habil</div>`;
        e.appendChild(c1);
        const dAct=diario.filter(r=>r.y===A).sort((a,b)=>a.d-b.d);
        const dAnt=diario.filter(r=>r.y===B).sort((a,b)=>a.d-b.d);
        const maxD=Math.max(...[...dAct,...dAnt].map(r=>r.d));
        const labels=Array.from({length:maxD},(_,i)=>i+1);
        mc(c1,{type:'line',data:{labels,datasets:[
            {label:B.toString(),data:labels.map(d=>(dAnt.find(r=>r.d===d)||{}).kg||null),borderColor:'#475569',backgroundColor:'#47556933',tension:0.3,pointRadius:3,spanGaps:true},
            {label:A.toString(),data:labels.map(d=>(dAct.find(r=>r.d===d)||{}).kg||null),borderColor:'#2563eb',backgroundColor:'#2563eb33',tension:0.3,pointRadius:4,borderWidth:2.5,spanGaps:true}
        ]},options:{scales:{y:{beginAtZero:true,ticks:{callback:v=>fm(v)}},x:{title:{display:true,text:'Dia del mes',color:'#64748b'}}}}
        });

        // Acumulado
        const c2=document.createElement('div');c2.className='cd';
        c2.innerHTML=`<div class="cd-t">Acumulado diario ${MN[mP]||''} — ${A} vs ${B} (kg)</div>`;
        e.appendChild(c2);
        mc(c2,{type:'line',data:{labels,datasets:[
            {label:B.toString(),data:labels.map(d=>(dAnt.find(r=>r.d===d)||{}).cum||null),borderColor:'#475569',backgroundColor:'#47556922',tension:0.3,fill:true,pointRadius:2,spanGaps:true},
            {label:A.toString(),data:labels.map(d=>(dAct.find(r=>r.d===d)||{}).cum||null),borderColor:'#2563eb',backgroundColor:'#2563eb22',tension:0.3,fill:true,pointRadius:3,borderWidth:2.5,spanGaps:true}
        ]},options:{scales:{y:{beginAtZero:true,ticks:{callback:v=>fm(v)}},x:{title:{display:true,text:'Dia del mes',color:'#64748b'}}}}
        });
    } else {
        e.innerHTML='<div class="cd"><div class="cd-t">No hay datos diarios del mes parcial</div></div>';
    }

    // Tabla DH
    const meses=[...new Set(D.mensual.map(d=>d.mes))].sort((a,b)=>a-b);
    const c3=document.createElement('div');c3.className='cd';
    c3.innerHTML='<div class="cd-t">Dias habiles de facturacion por mes</div>';
    let tbl='<table><thead><tr>'+meses.map(m=>'<th>'+MN[m]+'</th>').join('')+'</tr></thead><tbody><tr>';
    meses.forEach(m=>{tbl+=`<td style="text-align:center;font-weight:600">${DH[m]||'-'}</td>`});
    tbl+='</tr></tbody></table>';c3.innerHTML+=tbl;e.appendChild(c3);
}

    });

    e.appendChild(c2);
}
