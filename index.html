// ── CUBO helpers ──
function fCubo(y,vista){
    let r=D.cubo||[];
    if(y)r=r.filter(x=>x.y===y);
    if(vista&&vista!=='total')r=r.filter(x=>x.c===vista||x.r===vista||x.l===vista||x.s===vista);

}
function byMes(rows){const m={};rows.forEach(r=>{if(!m[r.m])m[r.m]={mes:r.m,kg:0,rec:0};m[r.m].kg+=r.k;m[r.m].rec+=r.rc;});return Object.values(m).sort((a,b)=>a.mes-b.mes);}
function byDimMes(rows,dk){const km={canal:'c',rubro:'r',linea:'l',suc:'s'};const k=km[dk]||dk;const m={};rows.forEach(r=>{const key=r[k]+'|'+r.m;if(!m[key])m[key]={dim:r[k],mes:r.m,kg:0,rec:0};m[key].kg+=r.k;m[key].rec+=r.rc;});return Object.values(m);}

let cTab=0;

function mkChart(ct,cfg){const w=document.createElement('div');w.className='chart-wrap';const cv=document.createElement('canvas');w.appendChild(cv);ct.appendChild(w);const c=new Chart(cv,{...cfg,options:{...cfg.options,responsive:true,maintainAspectRatio:false,plugins:{...cfg.options?.plugins,legend:{labels:{color:'#94a3b8',font:{size:11}}}},scales:Object.fromEntries(Object.entries(cfg.options?.scales||{}).map(([k,v])=>[k,{...v,ticks:{...v?.ticks,color:'#94a3b8',font:{size:10}},grid:{...v?.grid,color:'#33415533'}}]))}});charts.push(c);return c;}

// ── FILTRO SIMPLE (single-select) ──

    mkChart(card1,{type:'bar',data:{labels:allM.map(m=>MN[m]),datasets:[
        {label:ANO_ANT.toString(),data:allM.map(m=>(bB.find(d=>d.mes===m)||{}).kg||0),backgroundColor:'#475569',borderRadius:4},
        {label:ANO.toString(),data:allM.map(m=>(bA.find(d=>d.mes===m)||{}).kg||0),backgroundColor:'#2563eb',borderRadius:4}
    ]},options:{scales:{y:{beginAtZero:true,ticks:{callback:v=>fmt(v)}}}}
    });

    if(mP&&dT){
        const pctAv=Math.round(dTr/dT*100);
        const card2=document.createElement('div');card2.className='card';
        card2.innerHTML=`<div class="card-t">Avance ${mN} ${ANO}</div><div style="height:40px;background:#334155;border-radius:8px;overflow:hidden;position:relative;margin:12px 0"><div style="width:${pctAv}%;height:100%;background:linear-gradient(90deg,#2563eb,#3b82f6);display:flex;align-items:center;padding-left:12px;color:#fff;font-size:13px;font-weight:600">${fmt(kP)} (${pctAv}%)</div><div style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:11px">Proy: ${fmt(pK)}</div></div>`;
        el.appendChild(card2);
    }
}

// ── TAB 1: EVOLUCION POR CANAL ──
function tab1(el){
    const rA=fCubo(ANO,'total'),rB=fCubo(ANO_ANT,'total'),mOk=D.meta.meses_completos;
    const canales=[...new Set(rA.map(r=>r.c))];
    const card=document.createElement('div');card.className='card';
    card.innerHTML='<div class="card-t">Variacion YoY por canal — meses completos</div>';
    let tbl='<table><thead><tr><th>Canal</th>'+mOk.map(m=>'<th>'+MN[m]+'</th>').join('')+'<th>Prom.</th></tr></thead><tbody>';
    canales.forEach(c=>{
        let vars=[];
        tbl+=`<tr><td style="font-weight:500;max-width:200px">${c}</td>`;
        mOk.forEach(m=>{
            const ka=rB.filter(r=>r.c===c&&r.m===m).reduce((s,r)=>s+r.k,0);
            const kn=rA.filter(r=>r.c===c&&r.m===m).reduce((s,r)=>s+r.k,0);
            const vv=ka>0?Math.round((kn/ka-1)*1000)/10:0;vars.push(vv);
            tbl+=`<td style="color:${vv>=0?'#4ade80':'#f87171'};font-weight:600">${vv>0?'+':''}${vv}%</td>`;
        });
        const avg=vars.length?Math.round(vars.reduce((s,vv)=>s+vv,0)/vars.length*10)/10:0;
        tbl+=`<td style="font-weight:700;color:${avg>=0?'#4ade80':'#f87171'}">${avg>0?'+':''}${avg}%</td></tr>`;
    });
    tbl+='</tbody></table>';card.innerHTML+=tbl;el.appendChild(card);

    const card2=document.createElement('div');card2.className='card';
    card2.innerHTML='<div class="card-t">Evolucion mensual por canal (kg) — apilado</div>';el.appendChild(card2);
    const colors=['#2563eb','#f59e0b','#10b981','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16'];
    const topC=[...canales].sort((a,b)=>rA.filter(r=>r.c===b).reduce((s,r)=>s+r.k,0)-rA.filter(r=>r.c===a).reduce((s,r)=>s+r.k,0)).slice(0,8);
    const allM=[...new Set(rA.map(r=>r.m))].sort((a,b)=>a-b);
    mkChart(card2,{type:'bar',data:{labels:allM.map(m=>MN[m]),datasets:topC.map((c,i)=>({
        label:c,data:allM.map(m=>rA.filter(r=>r.c===c&&r.m===m).reduce((s,r)=>s+r.k,0)),backgroundColor:colors[i%8],borderRadius:3
    }))},options:{scales:{x:{stacked:true},y:{stacked:true,ticks:{callback:vv=>fmt(vv)}}}}
    });
}

// ── TAB 2: RECORTES ──
function tab2(el){
    const dims=[['canal','c','Canal'],['rubro','r','Rubro'],['linea','l','Linea'],['suc','s','Sucursal emision']];
    const fd=document.createElement('div');fd.className='filters';
    let aDim=dims[0];
    dims.forEach(([key,dk,label],i)=>{
        const f=document.createElement('div');f.className='flt'+(i===0?' on':'');f.textContent='Por '+label;
        f.onclick=()=>{fd.querySelectorAll('.flt').forEach(x=>x.classList.remove('on'));f.classList.add('on');aDim=[key,dk,label];renderRec();};
        fd.appendChild(f);
    });
    el.appendChild(fd);
    const cd=document.createElement('div');cd.id='rec-ct';el.appendChild(cd);

    function renderRec(){
        const ct=document.getElementById('rec-ct');ct.innerHTML='';
        const[key,dk,label]=aDim;
        const rows=fCubo(ANO,'total');
        const bdm=byDimMes(rows,key);
        const vals=[...new Set(bdm.map(r=>r.dim))];
        const meses=[...new Set(bdm.map(r=>r.mes))].sort((a,b)=>a-b);
        const card=document.createElement('div');card.className='card';
        card.innerHTML=`<div class="card-t">% Recorte por ${label} — evolucion mensual ${ANO}</div>`;
        let tbl='<table><thead><tr><th>'+label+'</th>'+meses.map(m=>'<th>'+MN[m]+'</th>').join('')+'<th>Acum.</th></tr></thead><tbody>';
        vals.forEach(vv=>{
            const vR=bdm.filter(r=>r.dim===vv);
            const tK=vR.reduce((s,r)=>s+r.kg,0);const tR=vR.reduce((s,r)=>s+r.rec,0);
            if(tK<5000)return;const tP=tK>0?Math.round(tR/tK*1000)/10:0;
            tbl+=`<tr><td style="font-weight:500;font-size:11px">${vv}</td>`;
            meses.forEach(m=>{const r=vR.find(x=>x.mes===m);const kg=r?r.kg:0;const rec=r?r.rec:0;const p=kg>0?Math.round(rec/kg*1000)/10:0;tbl+=`<td><span class="badge ${badge(p)}">${p}%</span></td>`;});
            tbl+=`<td style="font-weight:700"><span class="badge ${badge(tP)}">${tP}%</span></td></tr>`;
        });
        tbl+='</tbody></table>';card.innerHTML+=tbl;ct.appendChild(card);
    }
    renderRec();

    if(D.cruce_canal_linea&&D.cruce_canal_linea.length){
        const c3=document.createElement('div');c3.className='card';
        c3.innerHTML='<div class="card-t">Top combinaciones canal x linea con mayor recorte</div>';
        let t3='<table><thead><tr><th>Canal</th><th>Linea</th><th>Kg</th><th>Recorte</th><th>%</th></tr></thead><tbody>';
        D.cruce_canal_linea.forEach(r=>{t3+=`<tr><td>${r.canal}</td><td>${r.linea}</td><td>${fmt(r.kg)}</td><td>${fmt(r.rec)}</td><td><span class="badge ${badge(r.pct)}">${r.pct}%</span></td></tr>`;});
        t3+='</tbody></table>';c3.innerHTML+=t3;el.appendChild(c3);
    }
}

// ── TAB 3: PORTAFOLIO ──
function tab3(el){
    const pf=(D.portafolio||[]).filter(p=>p.kg_total>10000);
    const card=document.createElement('div');card.className='card';
    card.innerHTML='<div class="card-t">Desarrollo de portafolio por canal</div><div class="card-s">Amplitud = % SKUs activos vs catalogo. Equilibrio = distribucion entre lineas (1=equilibrado)</div>';
    let tbl='<table><thead><tr><th>Canal</th><th>Kg total</th><th>SKUs</th><th>Amplitud</th><th>Equilibrio</th></tr></thead><tbody>';
    pf.forEach(p=>{tbl+=`<tr><td style="font-weight:500">${p.canal}</td><td>${fmt(p.kg_total)}</td><td>${p.skus_activos}/${p.total_skus}</td><td><span class="badge ${p.amplitud>60?'b-grn':p.amplitud>30?'b-amb':'b-red'}">${p.amplitud}%</span></td><td style="font-weight:600">${(p.equilibrio*100).toFixed(0)}%</td></tr>`;});
    tbl+='</tbody></table>';card.innerHTML+=tbl;el.appendChild(card);
    const c2=document.createElement('div');c2.className='card';
    c2.innerHTML='<div class="card-t">Peso de lineas por canal (%)</div>';el.appendChild(c2);
    const allL=[...new Set(pf.flatMap(p=>Object.keys(p.composicion)))];
    const colors=['#2563eb','#f59e0b','#10b981','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f97316','#6366f1','#14b8a6','#e11d48','#a855f7','#0ea5e9'];
    mkChart(c2,{type:'bar',data:{labels:pf.map(p=>p.canal.substring(0,20)),datasets:allL.map((l,i)=>({
        label:l,data:pf.map(p=>p.composicion[l]||0),backgroundColor:colors[i%14],borderRadius:2
    }))},options:{indexAxis:'y',scales:{x:{stacked:true,max:100,ticks:{callback:vv=>vv+'%'}},y:{stacked:true}},plugins:{legend:{position:'bottom',labels:{font:{size:9}}}}}
    });
    c2.querySelector('.chart-wrap').style.height=(pf.length*40+80)+'px';
}

// ── TAB 4: KG/DIA HABIL ──
function tab4(el){
    renderVistaFilter(el);
    const v=vistaActual;
    const rA=fCubo(ANO,v),rB=fCubo(ANO_ANT,v);
    const bA=byMes(rA),bB=byMes(rB);
    const titulo=v==='total'?'':'  |  '+v;
    const card=document.createElement('div');card.className='card';
    card.innerHTML=`<div class="card-t">Kilogramos por dia habil${titulo}</div><div class="card-s">Normaliza estacionalidad por dias habiles de cada mes</div>`;
    el.appendChild(card);
    const allM=[...new Set([...bA,...bB].map(d=>d.mes))].sort((a,b)=>a-b);
    mkChart(card,{type:'bar',data:{labels:allM.map(m=>MN[m]),datasets:[
        {label:ANO_ANT.toString(),data:allM.map(m=>{const r=bB.find(d=>d.mes===m);return r?Math.round(r.kg/(DH[m]||22)):0;}),backgroundColor:'#475569',borderRadius:4},
        {label:ANO.toString(),data:allM.map(m=>{const r=bA.find(d=>d.mes===m);return r?Math.round(r.kg/(DH[m]||22)):0;}),backgroundColor:'#2563eb',borderRadius:4}
    ]},options:{scales:{y:{beginAtZero:true,ticks:{callback:vv=>fmt(vv)}}}}
    });
    const c2=document.createElement('div');c2.className='card';
    c2.innerHTML='<div class="card-t">Dias habiles por mes</div>';
    let tbl='<table><thead><tr>'+allM.map(m=>'<th>'+MN[m]+'</th>').join('')+'</tr></thead><tbody><tr>';
    allM.forEach(m=>{tbl+=`<td style="text-align:center;font-weight:600">${DH[m]||'-'}</td>`});
    tbl+='</tr></tbody></table>';c2.innerHTML+=tbl;el.appendChild(c2);
}

// ── TAB 5: ANOMALIAS ──
function tab5(el){
    const card=document.createElement('div');card.className='card';
    card.innerHTML='<div class="card-t">Deteccion de anomalias — de lo general a lo particular</div>';
    const niveles={1:'Rubro / lineas (total canales)',2:'Canales por rubro / sucursal',3:'Lineas por canal'};
    let cn=0;
    (D.anomalias||[]).forEach(a=>{
        if(a.nivel!==cn){card.innerHTML+=`<div style="font-size:13px;font-weight:600;color:var(--t1);margin:16px 0 8px">Nivel ${a.nivel} — ${niveles[a.nivel]||''}</div>`;cn=a.nivel;}
        card.innerHTML+=`<div class="alert ${a.severidad==='alta'?'a-red':'a-amb'}"><strong>${a.tipo}:</strong> ${a.detalle}</div>`;
    });
    if(!D.anomalias||!D.anomalias.length)card.innerHTML+='<div class="alert a-grn">No se detectaron anomalias significativas.</div>';
    el.appendChild(card);
    const c2=document.createElement('div');c2.className='card';
    c2.innerHTML=`<div class="card-t">Narrativa ejecutiva</div><div class="narr">${(D.narrativa||'').replace(/\n/g,'<br>')}</div>`;
    el.appendChild(c2);
}

showTab(0);
</script>
