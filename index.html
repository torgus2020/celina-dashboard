const MN = {1:'Ene',2:'Feb',3:'Mar',4:'Abr',5:'May',6:'Jun',7:'Jul',8:'Ago',9:'Sep',10:'Oct',11:'Nov',12:'Dic'};
const fmt = n => n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?Math.round(n/1e3)+'K':Math.round(n).toString();
const badge = p => p>20?'b-red':p>10?'b-amb':'b-grn';
let charts = [];

function showTab(i) {
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  charts.forEach(c=>c.destroy());
  charts=[];
  const el=document.getElementById('content');
  el.innerHTML='';
  [tab0,tab1,tab2,tab3,tab4,tab5][i](el);
}

function makeChart(container, cfg) {
  const wrap=document.createElement('div');
  wrap.className='chart-wrap';
  const canvas=document.createElement('canvas');
  wrap.appendChild(canvas);
  container.appendChild(wrap);
  const c=new Chart(canvas,{...cfg,options:{...cfg.options,responsive:true,maintainAspectRatio:false,plugins:{...cfg.options?.plugins,legend:{labels:{color:'#94a3b8',font:{size:11}}}},scales:Object.fromEntries(Object.entries(cfg.options?.scales||{}).map(([k,v])=>[k,{...v,ticks:{...v?.ticks,color:'#94a3b8',font:{size:10}},grid:{...v?.grid,color:'#33415533'}}]))}});
  charts.push(c);
  return c;
}

// ── TAB 0: RESUMEN ──
function tab0(el) {
  const p=D.proyeccion||{};
  const mOk=D.meta.meses_completos;
  const mAct=D.mensual.filter(d=>d.year===2026&&mOk.includes(d.mes));
  const mAnt=D.mensual.filter(d=>d.year===2025&&mOk.includes(d.mes));
  const kgAct=mAct.reduce((s,d)=>s+d.kg,0);
  const recAct=mAct.reduce((s,d)=>s+d.rec,0);
  const pctRec=kgAct>0?(recAct/kgAct*100).toFixed(1):0;

  el.innerHTML=`
  <div class="kpis">
    <div class="kpi"><div class="kpi-l">Proyección ${p.mes_nombre||''}</div><div class="kpi-v">${fmt(p.proy_kg||0)} kg</div><div class="kpi-d">Avance: ${fmt(p.kg_parcial||0)} (${p.dh_transcurridos||0} de ${p.dh_total||0} DH)</div></div>
    <div class="kpi"><div class="kpi-l">% Recorte acumulado</div><div class="kpi-v">${pctRec}%</div><div class="kpi-d ${pctRec>12?'down':'up'}">Meses completos: ${mOk.map(m=>MN[m]).join(', ')}</div></div>
    <div class="kpi"><div class="kpi-l">Proy ${p.mes_nombre||''} vs ${p.mes_anterior_nombre||''}</div><div class="kpi-v ${(p.var_vs_mes_anterior||0)>=0?'up':'down'}">${(p.var_vs_mes_anterior||0)>0?'+':''}${p.var_vs_mes_anterior||0}%</div><div class="kpi-d">${fmt(p.proy_kg||0)} vs ${fmt(p.kg_mes_anterior||0)} kg</div></div>
    <div class="kpi"><div class="kpi-l">Proy ${p.mes_nombre||''} vs MMAA</div><div class="kpi-v ${(p.var_vs_mmaa||0)>=0?'up':'down'}">${(p.var_vs_mmaa||0)>0?'+':''}${p.var_vs_mmaa||0}%</div><div class="kpi-d">${fmt(p.proy_kg||0)} vs ${fmt(p.kg_mmaa||0)} kg</div></div>
  </div>`;

  // Gráfico barras mensual YoY
  const card1=document.createElement('div');card1.className='card';
  card1.innerHTML='<div class="card-t">Sell-in mensual 2025 vs 2026 (kg)</div><div class="card-s">Meses completos. Abril 2026 muestra proyección.</div>';
  el.appendChild(card1);

  const allM=[...new Set(D.mensual.map(d=>d.mes))].sort((a,b)=>a-b);
  makeChart(card1,{
    type:'bar',
    data:{
      labels:allM.map(m=>MN[m]),
      datasets:[
        {label:'2025',data:allM.map(m=>{const r=D.mensual.find(d=>d.mes===m&&d.year===2025);return r?r.kg:0}),backgroundColor:'#475569',borderRadius:4},
        {label:'2026',data:allM.map(m=>{const r=D.mensual.find(d=>d.mes===m&&d.year===2026);return r?r.kg:0}),backgroundColor:'#2563eb',borderRadius:4}
      ]
    },
    options:{scales:{y:{beginAtZero:true,ticks:{callback:v=>fmt(v)}}}}
  });

  // Gráfico avance mes parcial
  if(p.mes){
    const card2=document.createElement('div');card2.className='card';
    card2.innerHTML=`<div class="card-t">Avance ${p.mes_nombre} 2026</div><div class="card-s">Fórmula: avance ÷ ${p.dh_transcurridos} DH transcurridos × ${p.dh_total} DH del mes = ${fmt(p.proy_kg)} kg proyectados</div>`;
    el.appendChild(card2);

    const pctAvance=(p.dh_transcurridos/p.dh_total*100).toFixed(0);
    const barDiv=document.createElement('div');
    barDiv.style.cssText='height:40px;background:#334155;border-radius:8px;overflow:hidden;position:relative;margin:12px 0';
    barDiv.innerHTML=`<div style="width:${pctAvance}%;height:100%;background:linear-gradient(90deg,#2563eb,#3b82f6);display:flex;align-items:center;padding-left:12px;color:#fff;font-size:13px;font-weight:600">${fmt(p.kg_parcial)} (${pctAvance}%)</div><div style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:11px">Meta proy: ${fmt(p.proy_kg)}</div>`;
    card2.appendChild(barDiv);
  }
}

// ── TAB 1: EVOLUCIÓN POR CANAL ──
function tab1(el) {
  const mOk=D.meta.meses_completos;
  const canales=[...new Set(D.yoy_canal.map(d=>d.canal))];

  const card=document.createElement('div');card.className='card';
  card.innerHTML='<div class="card-t">Variación YoY por canal — meses completos (% kg)</div>';
  let tbl='<table><thead><tr><th>Canal</th>'+mOk.map(m=>'<th>'+MN[m]+'</th>').join('')+'<th>Prom.</th></tr></thead><tbody>';
  canales.forEach(c=>{
    const rows=D.yoy_canal.filter(d=>d.canal===c);
    const avg=rows.length?Math.round(rows.reduce((s,r)=>s+r.var,0)/rows.length*10)/10:0;
    tbl+=`<tr><td style="font-weight:500;max-width:200px">${c}</td>`;
    mOk.forEach(m=>{
      const r=rows.find(x=>x.mes===m);
      const v=r?r.var:0;
      tbl+=`<td style="color:${v>=0?'#4ade80':'#f87171'};font-weight:600">${v>0?'+':''}${v}%</td>`;
    });
    tbl+=`<td style="font-weight:700;color:${avg>=0?'#4ade80':'#f87171'}">${avg>0?'+':''}${avg}%</td></tr>`;
  });
  tbl+='</tbody></table>';
  card.innerHTML+=tbl;
  el.appendChild(card);

  // Mix de canales
  const card2=document.createElement('div');card2.className='card';
  card2.innerHTML='<div class="card-t">Evolución mensual por canal (kg)</div>';
  el.appendChild(card2);
  const colors=['#2563eb','#f59e0b','#10b981','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16'];
  const topCanales=canales.sort((a,b)=>{
    const ka=D.yoy_canal.filter(d=>d.canal===a).reduce((s,r)=>s+r.kg_act,0);
    const kb=D.yoy_canal.filter(d=>d.canal===b).reduce((s,r)=>s+r.kg_act,0);
    return kb-ka;
  }).slice(0,8);
  const allM=[...new Set(D.mensual.filter(d=>d.year===2026).map(d=>d.mes))].sort((a,b)=>a-b);
  const datasets=topCanales.map((c,i)=>{
    const cData=D.recorte_canal.filter(d=>d.canal===c);
    return {label:c,data:allM.map(m=>{const r=cData.find(d=>d.mes===m);return r?r.kg:0}),backgroundColor:colors[i%8],borderRadius:3};
  });
  makeChart(card2,{type:'bar',data:{labels:allM.map(m=>MN[m]),datasets},options:{scales:{x:{stacked:true},y:{stacked:true,ticks:{callback:v=>fmt(v)}}}}});
}

// ── TAB 2: RECORTES ──
function tab2(el) {
  const dims=[['canal','recorte_canal','Canal'],['rubro','recorte_rubro','Rubro'],['linea','recorte_linea','Línea'],['suc_emision','recorte_suc_emision','Sucursal emisión']];
  const filterDiv=document.createElement('div');filterDiv.className='filters';
  dims.forEach(([key,dataKey,label],i)=>{
    const f=document.createElement('div');
    f.className='flt'+(i===0?' on':'');
    f.textContent='Por '+label;
    f.onclick=()=>{
      filterDiv.querySelectorAll('.flt').forEach(x=>x.classList.remove('on'));
      f.classList.add('on');
      renderRecorte(dataKey,key,label);
    };
    filterDiv.appendChild(f);
  });
  el.appendChild(filterDiv);

  const contentDiv=document.createElement('div');contentDiv.id='recorte-content';
  el.appendChild(contentDiv);

  function renderRecorte(dataKey,key,label) {
    const cd=document.getElementById('recorte-content');
    cd.innerHTML='';
    charts.forEach(c=>c.destroy());charts=[];
    const rows=D[dataKey]||[];
    const vals=[...new Set(rows.map(r=>r[key]))];
    const meses=[...new Set(rows.map(r=>r.mes))].sort((a,b)=>a-b);

    const card=document.createElement('div');card.className='card';
    card.innerHTML=`<div class="card-t">% Recorte por ${label} — evolución mensual 2026</div>`;
    let tbl='<table><thead><tr><th>'+label+'</th>'+meses.map(m=>'<th>'+MN[m]+'</th>').join('')+'<th>Acum.</th></tr></thead><tbody>';
    vals.forEach(v=>{
      const vRows=rows.filter(r=>r[key]===v);
      const totKg=vRows.reduce((s,r)=>s+r.kg,0);
      const totRec=vRows.reduce((s,r)=>s+r.rec,0);
      const totPct=totKg>0?Math.round(totRec/totKg*1000)/10:0;
      if(totKg<5000)return;
      tbl+=`<tr><td style="font-weight:500;font-size:11px">${v}</td>`;
      meses.forEach(m=>{
        const r=vRows.find(x=>x.mes===m);
        const p=r?r.pct:0;
        tbl+=`<td><span class="badge ${badge(p)}">${p}%</span></td>`;
      });
      tbl+=`<td style="font-weight:700"><span class="badge ${badge(totPct)}">${totPct}%</span></td></tr>`;
    });
    tbl+='</tbody></table>';
    card.innerHTML+=tbl;
    cd.appendChild(card);
  }

  renderRecorte('recorte_canal','canal','Canal');

  // Cruce canal × línea
  if(D.cruce_canal_linea&&D.cruce_canal_linea.length) {
    const card3=document.createElement('div');card3.className='card';
    card3.innerHTML='<div class="card-t">Top combinaciones canal × línea con mayor recorte</div><div class="card-s">Meses completos, mínimo 10.000 kg</div>';
    let t3='<table><thead><tr><th>Canal</th><th>Línea</th><th>Kg</th><th>Recorte</th><th>%</th></tr></thead><tbody>';
    D.cruce_canal_linea.forEach(r=>{
      t3+=`<tr><td>${r.canal}</td><td>${r.linea}</td><td>${fmt(r.kg)}</td><td>${fmt(r.rec)}</td><td><span class="badge ${badge(r.pct)}">${r.pct}%</span></td></tr>`;
    });
    t3+='</tbody></table>';
    card3.innerHTML+=t3;
    el.appendChild(card3);
  }
}

// ── TAB 3: PORTAFOLIO ──
function tab3(el) {
  const pf=D.portafolio.filter(p=>p.kg_total>10000);
  const card=document.createElement('div');card.className='card';
  card.innerHTML='<div class="card-t">Desarrollo de portafolio por canal</div><div class="card-s">Amplitud = % SKUs activos vs catálogo. Equilibrio = distribución entre líneas (1=equilibrado, 0=concentrado)</div>';
  let tbl='<table><thead><tr><th>Canal</th><th>Kg total</th><th>SKUs activos</th><th>Amplitud</th><th>Equilibrio</th></tr></thead><tbody>';
  pf.forEach(p=>{
    tbl+=`<tr><td style="font-weight:500">${p.canal}</td><td>${fmt(p.kg_total)}</td><td>${p.skus_activos} / ${p.total_skus}</td><td><span class="badge ${p.amplitud>60?'b-grn':p.amplitud>30?'b-amb':'b-red'}">${p.amplitud}%</span></td><td style="font-weight:600">${(p.equilibrio*100).toFixed(0)}%</td></tr>`;
  });
  tbl+='</tbody></table>';
  card.innerHTML+=tbl;
  el.appendChild(card);

  // Composición por línea (barras apiladas)
  const card2=document.createElement('div');card2.className='card';
  card2.innerHTML='<div class="card-t">Peso de líneas por canal (% del volumen)</div>';
  el.appendChild(card2);

  const allLineas=[...new Set(pf.flatMap(p=>Object.keys(p.composicion)))];
  const colors=['#2563eb','#f59e0b','#10b981','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f97316','#6366f1','#14b8a6','#e11d48','#a855f7','#0ea5e9'];
  const datasets2=allLineas.map((l,i)=>({
    label:l,
    data:pf.map(p=>p.composicion[l]||0),
    backgroundColor:colors[i%14],
    borderRadius:2
  }));
  makeChart(card2,{
    type:'bar',
    data:{labels:pf.map(p=>p.canal.substring(0,20)),datasets:datasets2},
    options:{indexAxis:'y',scales:{x:{stacked:true,max:100,ticks:{callback:v=>v+'%'}},y:{stacked:true}},plugins:{legend:{position:'bottom',labels:{font:{size:9}}}}},
  });
  card2.querySelector('.chart-wrap').style.height=(pf.length*40+80)+'px';
}

// ── TAB 4: KG/DÍA HÁBIL ──
function tab4(el) {
  const card=document.createElement('div');card.className='card';
  card.innerHTML='<div class="card-t">Kilogramos por día hábil — evolución mensual</div><div class="card-s">Normaliza la estacionalidad eliminando el efecto de días hábiles por mes</div>';
  el.appendChild(card);

  const allM=[...new Set(D.kg_dia_habil.map(d=>d.mes))].sort((a,b)=>a-b);
  makeChart(card,{
    type:'bar',
    data:{
      labels:allM.map(m=>MN[m]),
      datasets:[
        {label:'2025',data:allM.map(m=>{const r=D.kg_dia_habil.find(d=>d.mes===m&&d.year===2025);return r?r.kg_dh:0}),backgroundColor:'#475569',borderRadius:4},
        {label:'2026',data:allM.map(m=>{const r=D.kg_dia_habil.find(d=>d.mes===m&&d.year===2026);return r?r.kg_dh:0}),backgroundColor:'#2563eb',borderRadius:4}
      ]
    },
    options:{scales:{y:{beginAtZero:true,ticks:{callback:v=>fmt(v)}}}}
  });

  // Tabla de DH
  const card2=document.createElement('div');card2.className='card';
  card2.innerHTML='<div class="card-t">Días hábiles de facturación por mes</div>';
  let tbl='<table><thead><tr>'+allM.map(m=>'<th>'+MN[m]+'</th>').join('')+'</tr></thead><tbody><tr>';
  allM.forEach(m=>{tbl+=`<td style="text-align:center;font-weight:600">${D.meta.dias_habiles[m]||'—'}</td>`});
  tbl+='</tr></tbody></table>';
  card2.innerHTML+=tbl;
  el.appendChild(card2);
}

// ── TAB 5: ANOMALÍAS ──
function tab5(el) {
  const card=document.createElement('div');card.className='card';
  card.innerHTML='<div class="card-t">Detección de anomalías — de lo general a lo particular</div><div class="card-s">Nivel 1: rubro/línea total → Nivel 2: canales por rubro → Nivel 3: líneas por canal</div>';

  const niveles={1:'Rubro / líneas (total canales)',2:'Canales por rubro / sucursal',3:'Líneas por canal'};
  let currentNivel=0;
  (D.anomalias||[]).forEach(a=>{
    if(a.nivel!==currentNivel){
      card.innerHTML+=`<div style="font-size:13px;font-weight:600;color:var(--t1);margin:16px 0 8px">Nivel ${a.nivel} — ${niveles[a.nivel]||''}</div>`;
      currentNivel=a.nivel;
    }
    const cls=a.severidad==='alta'?'a-red':'a-amb';
    card.innerHTML+=`<div class="alert ${cls}"><strong>${a.tipo}:</strong> ${a.detalle}</div>`;
  });

  if(!D.anomalias||!D.anomalias.length){
    card.innerHTML+='<div class="alert a-grn">No se detectaron anomalías significativas.</div>';
  }
  el.appendChild(card);

  // Narrativa
  const card2=document.createElement('div');card2.className='card';
  card2.innerHTML=`<div class="card-t">Narrativa ejecutiva</div><div class="narr">${(D.narrativa||'').replace(/\n/g,'<br>')}</div>`;
  el.appendChild(card2);
}

// Init
showTab(0);
</script>
